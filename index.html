<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Audio Vault</title>
    <link rel="icon" type="image/x-icon" href="https://www.youtube.com/favicon.ico">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --surface-color: #1a1a1d;
            --primary-color: #bb86fc;
            --primary-variant: #9965d8;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --hover-color: #2c2c31;
            --active-color: #38383e;
            --transition-speed: 0.2s;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .player-container {
            width: min(80vw, 500px);
            background-color: var(--surface-color);
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 92vh;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header {
            padding: 16px 20px;
            background-color: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: var(--hover-color);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23a0a0a0" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .now-playing {
            padding: 24px 24px 16px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #album-art-image {
            width: min(100%, 280px);
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: none;
            background-color: var(--hover-color);
        }

        #current-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            letter-spacing: 0.3px;
        }

        #current-channel {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 20px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            font-weight: 500;
        }

        audio { display: none; }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            contain: layout paint style;
            transform: translateZ(0);
        }

        .time-display {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            transform: translateZ(0);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(187, 134, 252, 0.4);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color var(--transition-speed), background-color var(--transition-speed);
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .control-btn:hover {
            color: var(--text-primary);
            background-color: rgba(255,255,255,0.05);
        }

        .control-btn.active-state {
            color: var(--primary-color);
        }

        .main-btn {
            background-color: var(--text-primary);
            color: var(--bg-color);
            width: 56px;
            height: 56px;
        }
        
        .main-btn svg {
            width: 32px;
            height: 32px;
        }

        .main-btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            transform: scale(1.05);
        }

        .playlist-container {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.05);
            background-color: rgba(0,0,0,0.2);
        }

        .playlist-container::-webkit-scrollbar { width: 8px; }
        .playlist-container::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .playlist-container::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255,255,255,0.2);
        }

        #track-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #track-list li {
            padding: 14px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background-color var(--transition-speed);
        }

        #track-list li:hover { background-color: var(--hover-color); }

        #track-list li.active {
            background-color: var(--active-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 16px;
        }

        .track-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-channel {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-title.active-text { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">
        <select id="playlist-select">
            <option value="Gym">Gym</option>
            <option value="Driving">Driving</option>
            <option value="Songs">Songs</option>
        </select>
    </div>

    <div class="now-playing">
        <img id="album-art-image" src="" alt="Album Art">
        <h2 id="current-title">Select a track</h2>
        <p id="current-channel">--</p>
        
        <audio id="audio-player"></audio>

        <div class="progress-container">
            <span id="current-time" class="time-display">0:00</span>
            <input type="range" id="seek-bar" min="0" value="0" step="1">
            <span id="total-time" class="time-display">0:00</span>
        </div>
        
        <div class="playback-controls">
            <button id="btn-shuffle" class="control-btn" aria-label="Shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            
            <button id="btn-prev" class="control-btn" aria-label="Previous">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button id="btn-play-pause" class="control-btn main-btn" aria-label="Play/Pause">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <button id="btn-next" class="control-btn" aria-label="Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            
            <button id="btn-repeat" class="control-btn" aria-label="Repeat">
                <svg id="icon-repeat" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                <svg id="icon-repeat-one" viewBox="0 0 24 24" style="display: none;"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>
            </button>
        </div>
    </div>

    <div class="playlist-container">
        <ul id="track-list">
            <li>Loading...</li>
        </ul>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const playlistSelect = document.getElementById("playlist-select");
    const trackList = document.getElementById("track-list");
    const audioPlayer = document.getElementById("audio-player");
    const currentTitle = document.getElementById("current-title");
    const currentChannel = document.getElementById("current-channel");
    const albumArt = document.getElementById("album-art-image");
    
    const btnPlayPause = document.getElementById("btn-play-pause");
    const iconPlay = document.getElementById("icon-play");
    const iconPause = document.getElementById("icon-pause");
    
    const btnPrev = document.getElementById("btn-prev");
    const btnNext = document.getElementById("btn-next");
    const btnShuffle = document.getElementById("btn-shuffle");
    const btnRepeat = document.getElementById("btn-repeat");
    const iconRepeat = document.getElementById("icon-repeat");
    const iconRepeatOne = document.getElementById("icon-repeat-one");

    const seekBar = document.getElementById("seek-bar");
    const currentTimeDisplay = document.getElementById("current-time");
    const totalTimeDisplay = document.getElementById("total-time");

    const baseUrl = "https://hausemasterz.github.io/youtube_playlist_tracker_downloader";

    let currentPlaylistData = [];
    let playQueue = [];     
    let queueIndex = -1;    
    let activeListItem = null; 
    
    let isShuffle = false;
    let repeatMode = 0; 
    let isSeeking = false;
    let lastUpdateTime = -1;

    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('previoustrack', playPrev);
        navigator.mediaSession.setActionHandler('nexttrack', playNext);
        
        navigator.mediaSession.setActionHandler('play', () => {
            audioPlayer.play();
            setPlayUI(true);
        });

        navigator.mediaSession.setActionHandler('pause', () => {
            audioPlayer.pause();
            setPlayUI(false);
        });

        navigator.mediaSession.setActionHandler('seekto', (details) => {
            const targetTime = details.fastSeek && 'fastSeek' in audioPlayer ? details.seekTime : details.seekTime;
            audioPlayer.currentTime = targetTime;
            seekBar.value = Math.floor(targetTime);
            currentTimeDisplay.textContent = formatTime(targetTime);
            updateMediaSessionPosition();
        });
    }

    async function loadPlaylist(folderName) {
        trackList.innerHTML = `<li style="text-align: center; color: var(--text-secondary);">Loading...</li>`;
        const targetUrl = `${baseUrl}/${folderName}/_Playlist_Database.json?t=${Date.now()}`;
        try {
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
            
            currentPlaylistData = await response.json();
            generateQueue(true); 
            renderTracks();
        } catch (error) {
            trackList.innerHTML = `<li style="color: #ff5555; padding: 20px;">Failed to load playlist database. Ensure JSON exists in the folder.</li>`;
        }
    }

    function generateQueue(resetPlayback = false) {
        let indices = Array.from({length: currentPlaylistData.length}, (_, i) => i);
        
        if (isShuffle) {
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            if (!resetPlayback && queueIndex !== -1) {
                const currentOriginalIndex = playQueue[queueIndex];
                indices = indices.filter(i => i !== currentOriginalIndex);
                indices.unshift(currentOriginalIndex);
                queueIndex = 0;
            }
        } else if (!resetPlayback && queueIndex !== -1) {
            const currentOriginalIndex = playQueue[queueIndex];
            queueIndex = currentOriginalIndex;
        }
        
        playQueue = indices;
        if (resetPlayback) queueIndex = -1;
    }

    function renderTracks() {
        trackList.innerHTML = "";
        activeListItem = null;
        
        const fragment = document.createDocumentFragment();
        
        currentPlaylistData.forEach((track, originalIndex) => {
            const li = document.createElement("li");
            li.dataset.index = originalIndex;
            li.innerHTML = `
                <span class="track-title">${originalIndex + 1}. ${escapeHtml(track.title)}</span>
                <span class="track-channel">${escapeHtml(track.channel)}</span>
            `;
            fragment.appendChild(li);
        });
        
        trackList.appendChild(fragment);
    }

    trackList.addEventListener("click", (e) => {
        const li = e.target.closest("li");
        if (!li || !li.dataset.index) return;
        
        const targetOriginalIndex = parseInt(li.dataset.index);
        queueIndex = playQueue.indexOf(targetOriginalIndex);
        executePlayback();
    });

    function playNext() {
        if (playQueue.length === 0) return;
        
        if (queueIndex + 1 < playQueue.length) {
            queueIndex++;
            executePlayback();
        } else if (repeatMode === 1) { 
            queueIndex = 0;
            executePlayback();
        } else {
            setPlayUI(false);
        }
    }

    function playPrev() {
        if (playQueue.length === 0) return;

        if (audioPlayer.currentTime > 3) {
            audioPlayer.currentTime = 0;
            seekBar.value = 0;
            currentTimeDisplay.textContent = "0:00";
            lastUpdateTime = -1;
            audioPlayer.play();
            updateMediaSessionPosition();
            return;
        }

        if (queueIndex > 0) {
            queueIndex--;
            executePlayback();
        } else if (repeatMode === 1) {
            queueIndex = playQueue.length - 1;
            executePlayback();
        } else {
            audioPlayer.currentTime = 0;
            seekBar.value = 0;
            currentTimeDisplay.textContent = "0:00";
            lastUpdateTime = -1;
            audioPlayer.play();
            updateMediaSessionPosition();
        }
    }

    function executePlayback() {
        if (queueIndex < 0 || queueIndex >= playQueue.length) return;
        
        const originalIndex = playQueue[queueIndex];
        const track = currentPlaylistData[originalIndex];

        currentTitle.textContent = track.title;
        currentChannel.textContent = track.channel;

        if (activeListItem) {
            activeListItem.classList.remove("active");
            activeListItem.querySelector('.track-title').classList.remove("active-text");
        }
        
        const items = trackList.children;
        if (items[originalIndex]) {
            activeListItem = items[originalIndex];
            activeListItem.classList.add("active");
            activeListItem.querySelector('.track-title').classList.add("active-text");
            activeListItem.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        seekBar.value = 0;
        currentTimeDisplay.textContent = "0:00";
        totalTimeDisplay.textContent = "0:00";
        lastUpdateTime = -1;

        const audioPathParts = track.file_path.split('/');
        const safeAudioPath = audioPathParts.map(part => encodeURIComponent(part)).join('/');
        audioPlayer.src = `${baseUrl}/${safeAudioPath}`;
        
        audioPlayer.play().then(() => {
            setPlayUI(true);
        }).catch(e => {});

        let absoluteThumbUrl = "";
        if (track.thumbnail_path) {
            const thumbParts = track.thumbnail_path.split('/');
            const safeThumbPath = thumbParts.map(part => encodeURIComponent(part)).join('/');
            
            absoluteThumbUrl = `${baseUrl}/${safeThumbPath}`;
            albumArt.src = absoluteThumbUrl;
            albumArt.style.display = 'block';
        } else {
            albumArt.style.display = 'none';
        }

        if ('mediaSession' in navigator) {
            const artworkArray = absoluteThumbUrl ? [{ src: absoluteThumbUrl, sizes: '512x512', type: 'image/jpeg' }] : [];
            
            navigator.mediaSession.metadata = new MediaMetadata({
                title: track.title,
                artist: track.channel,
                album: playlistSelect.value,
                artwork: artworkArray
            });
        }
    }

    function updateMediaSessionPosition() {
        if ('mediaSession' in navigator && 'setPositionState' in navigator.mediaSession) {
            try {
                navigator.mediaSession.setPositionState({
                    duration: audioPlayer.duration,
                    playbackRate: audioPlayer.playbackRate,
                    position: audioPlayer.currentTime
                });
            } catch (error) {}
        }
    }

    function setPlayUI(isPlaying) {
        if (isPlaying) {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        } else {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
        }
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    btnPlayPause.addEventListener("click", () => {
        if (!audioPlayer.src) return; 
        if (audioPlayer.paused) {
            audioPlayer.play();
            setPlayUI(true);
        } else {
            audioPlayer.pause();
            setPlayUI(false);
        }
    });

    btnNext.addEventListener("click", playNext);
    btnPrev.addEventListener("click", playPrev);

    btnShuffle.addEventListener("click", () => {
        isShuffle = !isShuffle;
        btnShuffle.classList.toggle("active-state", isShuffle);
        generateQueue(false);
    });

    btnRepeat.addEventListener("click", () => {
        repeatMode = (repeatMode + 1) % 3;
        
        btnRepeat.classList.remove("active-state");
        iconRepeat.style.display = "block";
        iconRepeatOne.style.display = "none";

        if (repeatMode === 1) { 
            btnRepeat.classList.add("active-state");
        } else if (repeatMode === 2) { 
            btnRepeat.classList.add("active-state");
            iconRepeat.style.display = "none";
            iconRepeatOne.style.display = "block";
        }
    });

    audioPlayer.addEventListener("loadedmetadata", () => {
        const duration = Math.floor(audioPlayer.duration);
        seekBar.max = duration;
        totalTimeDisplay.textContent = formatTime(duration);
        updateMediaSessionPosition();
    });

    audioPlayer.addEventListener("timeupdate", () => {
        if (isSeeking || !audioPlayer.duration || document.hidden) return;
        
        const currentSecond = Math.floor(audioPlayer.currentTime);
        if (currentSecond !== lastUpdateTime) {
            seekBar.value = currentSecond;
            lastUpdateTime = currentSecond;
        }
    });

    document.addEventListener("visibilitychange", () => {
        if (!document.hidden && !isSeeking && audioPlayer.duration) {
            const currentSecond = Math.floor(audioPlayer.currentTime);
            seekBar.value = currentSecond;
            lastUpdateTime = currentSecond;
        }
    });

    seekBar.addEventListener("input", () => {
        isSeeking = true;
        currentTimeDisplay.textContent = formatTime(seekBar.value);
    });

    seekBar.addEventListener("change", (e) => {
        audioPlayer.currentTime = Number(e.target.value);
        isSeeking = false;
        currentTimeDisplay.textContent = formatTime(e.target.value);
        updateMediaSessionPosition();
    });

    audioPlayer.addEventListener("ended", () => {
        if (repeatMode === 2) { 
            audioPlayer.currentTime = 0;
            seekBar.value = 0;
            currentTimeDisplay.textContent = "0:00";
            lastUpdateTime = -1;
            audioPlayer.play();
            updateMediaSessionPosition();
        } else {
            playNext();
        }
    });

    audioPlayer.addEventListener("error", () => {
        currentTitle.textContent = "Error loading audio file";
        setPlayUI(false);
    });

    albumArt.addEventListener("error", () => {
        albumArt.style.display = 'none';
    });

    playlistSelect.addEventListener("change", (e) => {
        isShuffle = false;
        btnShuffle.classList.remove("active-state");
        loadPlaylist(e.target.value);
    });

    function escapeHtml(str) {
        if (!str) return "Unknown";
        return str.replace(/[&<>"']/g, (m) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        })[m]);
    }

    loadPlaylist(playlistSelect.value);
});
</script>

</body>
</html>
