<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="icon" type="image/x-icon" href="https://www.youtube.com/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        /* Sleek, flat premium design - Zero GPU overhead */
        :root {
            --bg-color: #0c0c0e;
            --surface-color: #151518;
            --primary-color: #8c73ff;
            --text-primary: #e6e6e6;
            --text-secondary: #888899;
            --hover-color: #1e1e24;
            --active-color: #24242d;
            --border-color: #26262e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .player-container {
            width: min(80vw, 450px);
            height: 97vh;
            background-color: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: none;
        }

        .header {
            padding: 16px 20px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: var(--hover-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: auto;
        }

        select:focus {
            border-color: var(--primary-color);
        }
        
        #search-input {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background-color: var(--hover-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

        #search-input:focus {
            border-color: var(--primary-color);
        }

        .now-playing {
            padding: 24px 20px 16px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        #album-art-image {
            width: min(100%, 300px);
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 24px;
            display: none;
            background-color: var(--hover-color);
            border: 1px solid var(--border-color);
        }

        #current-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            letter-spacing: 0.2px;
            color: #ffffff;
        }

        #current-channel {
            font-size: 14px;
            color: var(--primary-color);
            margin: 0 0 20px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            font-weight: 500;
        }

        audio { display: none; }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .time-display {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .control-btn:hover {
            color: var(--text-primary);
            background-color: var(--hover-color);
        }

        .yt-link-icon:hover {
            color: var(--text-primary);
            background-color: var(--border-color);
        }

        .track-thumb {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            margin-right: 12px;
            object-fit: cover;
            vertical-align: middle;
            flex-shrink: 0;
            background-color: #2a2a2a;
            transition: opacity 0.2s ease-in-out;
            opacity: 0;
        }

        .control-btn.active-state {
            color: var(--primary-color);
        }

        .main-btn {
            background-color: var(--primary-color);
            color: #000000;
            width: 52px;
            height: 52px;
        }
        
        .main-btn svg {
            width: 32px;
            height: 32px;
        }

        .main-btn:hover {
            background-color: #a491ff;
            color: #000000;
        }

        /* Virtual Scroller Container Styles */
        .playlist-container {
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }

        .playlist-container::-webkit-scrollbar { width: 6px; }
        .playlist-container::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }
        .playlist-container::-webkit-scrollbar-thumb:hover {
            background-color: #383842;
        }

        #track-list {
            list-style: none;
            padding: 0;
            margin: 0;
            position: relative;
        }

        #track-list li {
            position: absolute;
            left: 0;
            width: 100%;
            height: 48px; /* Fixed height for virtual scrolling */
            padding: 0 48px 0 16px; /* 48px right padding for the icon */
            box-sizing: border-box;
            cursor: pointer;
            display: block;
            line-height: 48px;
            border: none;
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .yt-link-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            text-decoration: none;
            opacity: 1;
            transition: color 0.2s, background-color 0.2s;
            z-index: 2;
        }

        .yt-link-icon:hover {
            color: var(--primary-color);
            background-color: var(--hover-color);
        }

        .yt-link-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        #track-list li:hover { background-color: var(--hover-color); }

        #track-list li.active {
            background-color: var(--active-color);
            border-left: 3px solid var(--primary-color);
            padding-left: 13px; /* 16px - 3px border */
            color: var(--primary-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">
        <select id="playlist-select">
            <option value="Gym">Gym</option>
            <option value="Driving">Driving</option>
            <option value="Songs">Songs</option>
        </select>
        <input type="text" id="search-input" placeholder="Search tracks..." autocomplete="off" autofocus>
    </div>

    <div class="now-playing">
        <img id="album-art-image" src="" alt="Album Art">
        <h2 id="current-title">Select a track</h2>
        <p id="current-channel">--</p>
        
        <audio id="audio-player"></audio>

        <div class="progress-container">
            <span id="current-time" class="time-display">0:00</span>
            <input type="range" id="seek-bar" min="0" value="0" step="1">
            <span id="total-time" class="time-display">0:00</span>
        </div>
        
        <div class="playback-controls">
            <button id="btn-shuffle" class="control-btn" aria-label="Shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            
            <button id="btn-prev" class="control-btn" aria-label="Previous">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button id="btn-play-pause" class="control-btn main-btn" aria-label="Play/Pause">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <button id="btn-next" class="control-btn" aria-label="Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            
            <button id="btn-repeat" class="control-btn" aria-label="Repeat">
                <svg id="icon-repeat" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                <svg id="icon-repeat-one" viewBox="0 0 24 24" style="display: none;"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>
            </button>
        </div>
    </div>

    <div class="playlist-container" id="playlist-container">
        <ul id="track-list">
            <li style="position: static; text-align: center; justify-content: center; border: none;">Loading...</li>
        </ul>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const playlistSelect = document.getElementById("playlist-select");
    const searchInput = document.getElementById("search-input");
    const playlistContainer = document.getElementById("playlist-container");
    const trackList = document.getElementById("track-list");
    const audioPlayer = document.getElementById("audio-player");
    const currentTitle = document.getElementById("current-title");
    const currentChannel = document.getElementById("current-channel");
    const albumArt = document.getElementById("album-art-image");
    
    const btnPlayPause = document.getElementById("btn-play-pause");
    const iconPlay = document.getElementById("icon-play");
    const iconPause = document.getElementById("icon-pause");
    
    const btnPrev = document.getElementById("btn-prev");
    const btnNext = document.getElementById("btn-next");
    const btnShuffle = document.getElementById("btn-shuffle");
    const btnRepeat = document.getElementById("btn-repeat");
    const iconRepeat = document.getElementById("icon-repeat");
    const iconRepeatOne = document.getElementById("icon-repeat-one");

    const seekBar = document.getElementById("seek-bar");
    const currentTimeDisplay = document.getElementById("current-time");
    const totalTimeDisplay = document.getElementById("total-time");

    const baseUrl = "https://raw.githubusercontent.com/HauseMasterZ/youtube_playlist_tracker_downloader/main";

    const ALL_PLAYLISTS = ["Gym", "Driving", "Songs"];
    let allDatabases = {
        Gym: null,
        Driving: null,
        Songs: null
    };
    let currentPlaylistData = [];
    let filteredIndices = []; // Stores objects { playlist, index }
    
    let playQueue = [];     
    let queueIndex = -1;    
    let globalActiveOriginalIndex = -1; 
    let imageDebounceTimer = null; 
    
    let isShuffle = false;
    let repeatMode = 0; 
    let isSeeking = false;
    
    // UI Throttling
    let lastRenderTime = -1;
    let syncInterval = null;

    // Virtual Scroller state
    const ITEM_HEIGHT = 48;
    let lastStartIndex = -1;
    let lastEndIndex = -1;
    let isRendering = false;

    async function preloadAllPlaylists() {
        for (const pl of ALL_PLAYLISTS) {
            try {
                const res = await fetch(`${baseUrl}/${pl}/_Playlist_Database.json?t=${Date.now()}`);
                if (res.ok) {
                    allDatabases[pl] = await res.json();
                }
            } catch (e) {}
        }
    }

    async function loadPlaylist(folderName) {
        trackList.innerHTML = '<li style="position: static; text-align: center; justify-content: center; border: none; color: var(--text-secondary);">Loading...</li>';
        trackList.style.height = 'auto';
        
        try {
            if (!allDatabases[folderName]) {
                const res = await fetch(`${baseUrl}/${folderName}/_Playlist_Database.json?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                allDatabases[folderName] = await res.json();
            }
            
            currentPlaylistData = allDatabases[folderName];
            
            searchInput.value = '';
            filteredIndices = currentPlaylistData.map((_, i) => ({ playlist: folderName, index: i }));
            
            trackList.style.height = `${filteredIndices.length * ITEM_HEIGHT}px`;
            globalActiveOriginalIndex = -1;
            
            generateQueue(true); 
            
            // Force first render
            lastStartIndex = -1;
            renderVirtualTracks();
        } catch (error) {
            trackList.style.height = 'auto';
            trackList.innerHTML = '<li style="position: static; text-align: center; justify-content: center; border: none; color: #ff5555;">Failed to load playlist database.</li>';
        }
    }

    searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        const currentPl = playlistSelect.value;
        
        if (!query) {
            filteredIndices = currentPlaylistData.map((_, i) => ({ playlist: currentPl, index: i }));
        } else {
            filteredIndices = [];
            const addedIds = new Set();
            
            // 1. Current playlist matches
            if (currentPlaylistData) {
                for (let i = 0; i < currentPlaylistData.length; i++) {
                    const track = currentPlaylistData[i];
                    if (track.title.toLowerCase().includes(query) || track.channel.toLowerCase().includes(query)) {
                        filteredIndices.push({ playlist: currentPl, index: i });
                        addedIds.add(track.id);
                    }
                }
            }
            
            // 2. Global matches (other playlists)
            for (const pl of ALL_PLAYLISTS) {
                if (pl !== currentPl && allDatabases[pl]) {
                    const data = allDatabases[pl];
                    for (let i = 0; i < data.length; i++) {
                        const track = data[i];
                        if (track.title.toLowerCase().includes(query) || track.channel.toLowerCase().includes(query)) {
                            if (!addedIds.has(track.id)) {
                                filteredIndices.push({ playlist: pl, index: i });
                                addedIds.add(track.id);
                            }
                        }
                    }
                }
            }
        }
        
        if (filteredIndices.length > 0) {
            trackList.style.height = `${filteredIndices.length * ITEM_HEIGHT}px`;
        } else {
            trackList.style.height = 'auto';
        }
        
        lastStartIndex = -1;
        renderVirtualTracks();
    });

    // --- Virtual Scroller Core ---
    function renderVirtualTracks() {
        if (!currentPlaylistData || currentPlaylistData.length === 0) return;
        
        if (filteredIndices.length === 0) {
            trackList.innerHTML = '<li style="position: static; text-align: center; justify-content: center; border: none; color: var(--text-secondary);">No results found.</li>';
            isRendering = false;
            return;
        }

        const scrollTop = playlistContainer.scrollTop;
        const containerHeight = playlistContainer.clientHeight || 400;

        // Render buffer (3 items above and below viewport to prevent flashing)
        const startIndex = Math.max(0, Math.floor(scrollTop / ITEM_HEIGHT) - 3);
        const endIndex = Math.min(filteredIndices.length - 1, Math.ceil((scrollTop + containerHeight) / ITEM_HEIGHT) + 3);

        // Only redraw DOM if the index window actually shifted
        if (lastStartIndex === startIndex && lastEndIndex === endIndex) {
            return; 
        }

        lastStartIndex = startIndex;
        lastEndIndex = endIndex;
        isRendering = true;

        const currentPl = playlistSelect.value;
        const requiredNodes = (endIndex - startIndex + 1);
        
        // Ensure we don't accidentally recycle the "Loading..." or "No results" messages!
        if (trackList.children.length > 0 && !trackList.children[0].querySelector('a.yt-link-icon')) {
            trackList.innerHTML = ""; 
        }
        
        // DOM Object Pooling: Only create elements if we don't have enough in the pool
        while (trackList.children.length < requiredNodes) {
            const li = document.createElement("li");
            li.style.display = "flex";
            li.style.alignItems = "center";
            
            const thumbImg = document.createElement("canvas");
            thumbImg.width = 64; // High-res retina scale for 32x32 UI element
            thumbImg.height = 64;
            thumbImg.className = "track-thumb";
            thumbImg.style.transition = 'opacity 0.2s ease-in-out';
            
            const textSpan = document.createElement("span");
            textSpan.style.flex = "1";
            textSpan.style.whiteSpace = "nowrap";
            textSpan.style.overflow = "hidden";
            textSpan.style.textOverflow = "ellipsis";
            textSpan.style.paddingRight = "40px";
            
            const linkA = document.createElement("a");
            linkA.target = "_blank";
            linkA.className = "yt-link-icon";
            linkA.title = "Open on YouTube";
            linkA.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>';
            linkA.addEventListener("click", (e) => e.stopPropagation());
            
            li.appendChild(thumbImg);
            li.appendChild(textSpan);
            li.appendChild(linkA);
            trackList.appendChild(li);
        }
        
        // Hide any excess pooled nodes
        for (let i = requiredNodes; i < trackList.children.length; i++) {
            trackList.children[i].style.display = "none";
        }

        let childIdx = 0;
        for (let i = startIndex; i <= endIndex; i++) {
            const item = filteredIndices[i];
            const track = allDatabases[item.playlist][item.index];
            const li = trackList.children[childIdx++];
            const thumbImg = li.childNodes[0];
            const textSpan = li.childNodes[1];
            const linkA = li.childNodes[2];
            
            li.style.display = "flex";
            li.dataset.playlist = item.playlist;
            li.dataset.index = item.index;
            li.style.top = `${i * ITEM_HEIGHT}px`;
            
            const isCurrentPlaylist = (item.playlist === currentPl);
            
            if (isCurrentPlaylist && item.index === globalActiveOriginalIndex) {
                li.classList.add("active");
            } else {
                li.classList.remove("active");
            }
            
            let text = `${item.index + 1}. ${track.title} - ${track.channel}`;
            
            if (!isCurrentPlaylist) {
                text += ` [In ${item.playlist}]`;
                li.style.color = 'var(--text-secondary)';
            } else {
                li.style.color = ''; // reset to CSS default
            }
            
            if (track.is_dead) {
                li.style.color = '#ff5555';
                text += ' [DEAD]';
            }
            
            if (track.thumbnail_path) {
                const safeThumbPath = track.thumbnail_path.split('/').map(encodeURIComponent).join('/');
                const newSrc = `${baseUrl}/${safeThumbPath}`;
                
                if (thumbImg.dataset.src !== safeThumbPath) {
                    thumbImg.style.transition = 'none';
                    thumbImg.style.opacity = '0';
                    
                    const ctx = thumbImg.getContext('2d');
                    ctx.clearRect(0, 0, thumbImg.width, thumbImg.height);
                    
                    thumbImg.dataset.src = safeThumbPath;
                    thumbImg.dataset.pendingSrc = newSrc;
                } else if (!thumbImg.dataset.pendingSrc) {
                    thumbImg.style.opacity = '1';
                }
                thumbImg.style.display = "block";
            } else {
                thumbImg.style.display = "none";
                thumbImg.dataset.src = "";
                delete thumbImg.dataset.pendingSrc;
            }
            
            textSpan.textContent = text;
            li.title = text; // Tooltip for full visibility of long names
            linkA.href = track.url || `https://www.youtube.com/watch?v=${track.id}`;
        }
        
        // Debounce thumbnail network requests to prevent browser socket starvation during rapid scrolling
        clearTimeout(imageDebounceTimer);
        imageDebounceTimer = setTimeout(() => {
            for (let i = 0; i < trackList.children.length; i++) {
                const tCanvas = trackList.children[i].childNodes[0];
                if (tCanvas && tCanvas.dataset.pendingSrc) {
                    const src = tCanvas.dataset.pendingSrc;
                    delete tCanvas.dataset.pendingSrc;
                    
                    // Client-Side Downscaling: Decodes HD image to 64x64 OFF the main thread to save RAM
                    fetch(src)
                        .then(res => res.blob())
                        .then(blob => createImageBitmap(blob, { resizeWidth: 64, resizeHeight: 64 }))
                        .then(bitmap => {
                            // Check if user scrolled away while decoding
                            if (tCanvas.dataset.src === src.split(`${baseUrl}/`)[1]) {
                                const ctx = tCanvas.getContext('2d');
                                ctx.clearRect(0, 0, 64, 64);
                                ctx.drawImage(bitmap, 0, 0, 64, 64);
                                
                                tCanvas.style.transition = 'opacity 0.2s ease-in-out';
                                tCanvas.style.opacity = '1';
                            }
                            bitmap.close(); // Instantly destroy uncompressed bitmap from RAM
                        })
                        .catch(err => {}); // Ignore 404s or network aborts
                }
            }
        }, 75);
        
        isRendering = false;
    }

    playlistContainer.addEventListener("scroll", () => {
        if (!isRendering) {
            window.requestAnimationFrame(renderVirtualTracks);
        }
    });

    function scrollToTrack(originalIndex) {
        const currentPl = playlistSelect.value;
        const virtualIndex = filteredIndices.findIndex(item => item.playlist === currentPl && item.index === originalIndex);
        
        if (virtualIndex === -1) {
            // Track is currently filtered out of view, silently update active class state
            lastStartIndex = -1;
            renderVirtualTracks();
            return; 
        }
        
        const scrollPos = virtualIndex * ITEM_HEIGHT;
        const containerHeight = playlistContainer.clientHeight || 400;
        playlistContainer.scrollTo({ 
            top: scrollPos - (containerHeight / 2) + (ITEM_HEIGHT / 2), 
            behavior: "smooth" 
        });
        
        // Force highlight update immediately even during scroll
        lastStartIndex = -1;
        renderVirtualTracks();
    }
    // -----------------------------

    function generateQueue(resetPlayback = false) {
        let indices = Array.from({length: currentPlaylistData.length}, (_, i) => i);
        
        if (isShuffle) {
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            if (!resetPlayback && queueIndex !== -1) {
                const currentOriginalIndex = playQueue[queueIndex];
                indices = indices.filter(i => i !== currentOriginalIndex);
                indices.unshift(currentOriginalIndex);
                queueIndex = 0;
            }
        } else if (!resetPlayback && queueIndex !== -1) {
            const currentOriginalIndex = playQueue[queueIndex];
            queueIndex = currentOriginalIndex;
        }
        
        playQueue = indices;
        if (resetPlayback) queueIndex = -1;
    }

    trackList.addEventListener("click", (e) => {
        const li = e.target.closest("li");
        if (!li || !li.dataset.index || !li.dataset.playlist) return;
        
        const targetPlaylist = li.dataset.playlist;
        const targetOriginalIndex = parseInt(li.dataset.index);
        
        if (targetPlaylist !== playlistSelect.value) {
            // Cross-playlist jump!
            playlistSelect.value = targetPlaylist;
            loadPlaylist(targetPlaylist).then(() => {
                queueIndex = playQueue.indexOf(targetOriginalIndex);
                executePlayback();
            });
        } else {
            // If we are playing from a search, clear the search instantly
            if (searchInput.value.trim() !== "") {
                searchInput.value = "";
                filteredIndices = currentPlaylistData.map((_, i) => ({ playlist: playlistSelect.value, index: i }));
                trackList.style.height = `${filteredIndices.length * ITEM_HEIGHT}px`;
            }
            queueIndex = playQueue.indexOf(targetOriginalIndex);
            executePlayback();
        }
    });

    function playNext() {
        if (playQueue.length === 0) return;
        
        if (queueIndex + 1 < playQueue.length) {
            queueIndex++;
            executePlayback();
        } else if (repeatMode === 1) { 
            queueIndex = 0;
            executePlayback();
        } else {
            setPlayUI(false);
        }
    }

    function playPrev() {
        if (playQueue.length === 0) return;

        if (audioPlayer.currentTime > 3) {
            audioPlayer.currentTime = 0;
            updateTimeUI(0);
            audioPlayer.play();
            return;
        }

        if (queueIndex > 0) {
            queueIndex--;
            executePlayback();
        } else if (repeatMode === 1) {
            queueIndex = playQueue.length - 1;
            executePlayback();
        } else {
            audioPlayer.currentTime = 0;
            updateTimeUI(0);
            audioPlayer.play();
        }
    }

    function executePlayback(preventAutoplay = false) {
        if (queueIndex < 0 || queueIndex >= playQueue.length) return;
        
        const originalIndex = playQueue[queueIndex];
        globalActiveOriginalIndex = originalIndex;
        
        const track = currentPlaylistData[originalIndex];

        currentTitle.textContent = track.title;
        currentTitle.style.color = "#ffffff"; // Reset color in case it was red from an error
        currentChannel.textContent = track.channel;
        
        localStorage.setItem("lastPlaylist", playlistSelect.value);
        localStorage.setItem("lastTrackId", track.id);

        scrollToTrack(originalIndex);

        updateTimeUI(0);
        totalTimeDisplay.textContent = "0:00";

        const audioPathParts = track.file_path.split('/');
        const safeAudioPath = audioPathParts.map(part => encodeURIComponent(part)).join('/');
        audioPlayer.src = `${baseUrl}/${safeAudioPath}`;
        
        if (!preventAutoplay) {
            audioPlayer.play().then(() => {
                setPlayUI(true);
            }).catch(e => {});
        }

        if (track.thumbnail_path) {
            const thumbParts = track.thumbnail_path.split('/');
            const safeThumbPath = thumbParts.map(part => encodeURIComponent(part)).join('/');
            
            albumArt.src = `${baseUrl}/${safeThumbPath}`;
            albumArt.style.display = 'block';
        } else {
            albumArt.style.display = 'none';
        }

        if ('mediaSession' in navigator) {
            const artworkSrc = track.thumbnail_path ? [{ src: `${baseUrl}/${track.thumbnail_path.split('/').map(encodeURIComponent).join('/')}` }] : [];
            navigator.mediaSession.metadata = new MediaMetadata({
                title: track.title,
                artist: track.channel,
                artwork: artworkSrc
            });
            navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
            navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
            navigator.mediaSession.setActionHandler('previoustrack', playPrev);
            navigator.mediaSession.setActionHandler('nexttrack', playNext);
        }
    }

    function setPlayUI(isPlaying) {
        if (isPlaying) {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        } else {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
        }
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function updateTimeUI(seconds) {
        if (seconds === lastRenderTime) return;
        seekBar.value = seconds;
        currentTimeDisplay.textContent = formatTime(seconds);
        lastRenderTime = seconds;
    }

    btnPlayPause.addEventListener("click", () => {
        if (!audioPlayer.src) return; 
        if (audioPlayer.paused) {
            audioPlayer.play();
            setPlayUI(true);
        } else {
            audioPlayer.pause();
            setPlayUI(false);
        }
    });

    btnNext.addEventListener("click", playNext);
    btnPrev.addEventListener("click", playPrev);

    btnShuffle.addEventListener("click", () => {
        isShuffle = !isShuffle;
        if (isShuffle) btnShuffle.classList.add("active-state");
        else btnShuffle.classList.remove("active-state");
        generateQueue(false);
    });

    btnRepeat.addEventListener("click", () => {
        repeatMode = (repeatMode + 1) % 3;
        
        btnRepeat.classList.remove("active-state");
        iconRepeat.style.display = "block";
        iconRepeatOne.style.display = "none";

        if (repeatMode === 1) { 
            btnRepeat.classList.add("active-state");
        } else if (repeatMode === 2) { 
            btnRepeat.classList.add("active-state");
            iconRepeat.style.display = "none";
            iconRepeatOne.style.display = "block";
        }
    });

    audioPlayer.addEventListener("loadedmetadata", () => {
        const duration = Math.floor(audioPlayer.duration);
        seekBar.max = duration;
        totalTimeDisplay.textContent = formatTime(duration);
    });

    // --- Deep Sleep JS Engine Integration ---
    function startSync() {
        if (!syncInterval && !audioPlayer.paused) {
            syncInterval = setInterval(() => {
                if (!isSeeking && audioPlayer.duration) {
                    const ct = Math.floor(audioPlayer.currentTime);
                    updateTimeUI(ct);
                    localStorage.setItem("lastTime", audioPlayer.currentTime);
                }
            }, 1000);
        }
    }

    function stopSync() {
        if (syncInterval) {
            clearInterval(syncInterval);
            syncInterval = null;
        }
    }

    audioPlayer.addEventListener("play", startSync);
    audioPlayer.addEventListener("pause", stopSync);

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            stopSync(); // Engine completely suspends operations in background
        } else {
            if (!audioPlayer.paused) {
                updateTimeUI(Math.floor(audioPlayer.currentTime));
                startSync();
            }
        }
    });
    // ----------------------------------------

    seekBar.addEventListener("input", () => {
        isSeeking = true;
        currentTimeDisplay.textContent = formatTime(seekBar.value);
    });

    seekBar.addEventListener("change", (e) => {
        audioPlayer.currentTime = Number(e.target.value);
        isSeeking = false;
        updateTimeUI(Number(e.target.value));
    });

    audioPlayer.addEventListener("ended", () => {
        if (repeatMode === 2) { 
            audioPlayer.currentTime = 0;
            updateTimeUI(0);
            audioPlayer.play();
        } else {
            playNext();
        }
    });

    audioPlayer.addEventListener("error", () => {
        currentTitle.textContent = "Error loading file... skipping";
        currentTitle.style.color = "#ff5555";
        setPlayUI(false);
        setTimeout(() => {
            playNext();
        }, 3000);
    });

    albumArt.addEventListener("error", () => {
        albumArt.style.display = 'none';
    });

    playlistSelect.addEventListener("change", (e) => {
        isShuffle = false;
        btnShuffle.classList.remove("active-state");
        loadPlaylist(e.target.value);
    });

    // Initialize
    preloadAllPlaylists().then(() => {
        const lastPlaylist = localStorage.getItem("lastPlaylist");
        if (lastPlaylist && ALL_PLAYLISTS.includes(lastPlaylist)) {
            playlistSelect.value = lastPlaylist;
        }
        
        loadPlaylist(playlistSelect.value).then(() => {
            const lastTrackId = localStorage.getItem("lastTrackId");
            if (lastTrackId) {
                const targetOriginalIndex = currentPlaylistData.findIndex(t => t.id === lastTrackId);
                if (targetOriginalIndex !== -1) {
                    queueIndex = playQueue.indexOf(targetOriginalIndex);
                    executePlayback(true); // true = preventAutoplay
                    
                    const savedTime = localStorage.getItem("lastTime");
                    if (savedTime) {
                        const restoreTime = () => {
                            audioPlayer.currentTime = parseFloat(savedTime);
                            updateTimeUI(parseFloat(savedTime));
                            audioPlayer.removeEventListener("loadedmetadata", restoreTime);
                        };
                        audioPlayer.addEventListener("loadedmetadata", restoreTime);
                    }
                }
            }
        });
    });
});
</script>
